apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: choretwo-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - choretwo.stillon.top
    - choretwo-staging.stillon.top
    secretName: choretwo-tls
  rules:
  - host: choretwo.stillon.top
    http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 80
      - path: /api/chores
        pathType: Prefix
        backend:
          service:
            name: chore-service
            port:
              number: 80
      - path: /api/logs
        pathType: Prefix
        backend:
          service:
            name: log-service
            port:
              number: 80
      - path: /api/notify
        pathType: Prefix
        backend:
          service:
            name: notification-service
            port:
              number: 80
      - path: /api/ai
        pathType: Prefix
        backend:
          service:
            name: ai-copilot-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: choretwo-staging.stillon.top
    http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 80
      - path: /api/chores
        pathType: Prefix
        backend:
          service:
            name: chore-service
            port:
              number: 80
      - path: /api/logs
        pathType: Prefix
        backend:
          service:
            name: log-service
            port:
              number: 80
      - path: /api/notify
        pathType: Prefix
        backend:
          service:
            name: notification-service
            port:
              number: 80
      - path: /api/ai
        pathType: Prefix
        backend:
          service:
            name: ai-copilot-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
