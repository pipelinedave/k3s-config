apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: choretwo-production
  namespace: flux-system
spec:
  targetNamespace: choretwo-production
  interval: 5m
  path: ./kustomize/choretwo/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  dependsOn:
  - name: dex
  - name: nginx-ingress
  - name: cert-manager
