apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: choretwo-staging
namePrefix: staging-
commonLabels:
  environment: staging

patches:
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: USE_MOCK_AUTH
        value: "true"
  target:
    kind: Deployment
    name: auth-service
